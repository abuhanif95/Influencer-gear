<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHT Products</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="icon hamburger-menu" id="hamburgerMenu">
          <i class="fas fa-bars"></i>
        </div>

        <h1 class="logo">
          S<span>H</span>T &nbsp;<span class="logo-highlights">Products</span>
        </h1>

        <ul class="nav-links">
          <li class="nav-item"><a href="" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="" class="nav-link">Products</a></li>
          <li class="nav-item"><a href="" class="nav-link">Sign up</a></li>
          <li class="nav-item"><a href="" class="nav-link">Log in</a></li>
        </ul>

        <div class="nav-icons">
          <!-- Search -->
          <div class="icon search-icon" id="searchIcon">
            <i class="fas fa-search"></i>
          </div>

          <!-- Cart -->
          <div class="icon cart-icon" id="cartIcon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">5</span>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <div class="hero">
        <div class="hero-details">
          <h1 class="hero-title">Elevate Your Content with Pro Creator Gear</h1>
          <p class="hero-description">
            Discover premium cameras, drones, lighting, and audio equipment for
            serious influencer. Everything you need to create stunning content
            that stands out.
          </p>
          <a href="#products" class="hero-btn btn"
            >Preebook Now <i class="fas fa-arrow-right"></i
          ></a>
        </div>
        <div class="hero-image">
          <img
            src="./images/main-camera.png"
            alt="Professional Mirrorless Camera for Content Creators"
          />
        </div>
      </div>

      <div class="companies">
        <img src="./logos/Alibaba.svg" alt="Alibaba" />
        <img src="./logos/Amazon.svg" alt="Amazon" />
        <img src="./logos/Daraz.pk Logo.svg" alt="Daraz" />
        <img src="./logos/Ebay.svg" alt="Ebay" />
        <img src="./logos/Rakuten.svg" alt="Rakuten" />
        <img class="image6" src="./logos/Walmart.svg" alt="Walmart" />
        <img src="./logos/Target.svg" alt="Target" />
      </div>
    </main>
  </body>
</html>
